<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>🔐 관리자 — 승부예측</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100dvh;padding-bottom:48px}
:root{--gold:#f5a623;--red:#e94560;--green:#3fb950;--blue:#58a6ff;--surface:#161b22;--card:#21262d;--border:#30363d;--muted:#8b949e}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;text-align:center}
.admin-badge{display:inline-flex;align-items:center;gap:6px;background:var(--red);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;color:#fff;margin-bottom:10px}
.header h1{font-size:18px;font-weight:700}.header p{font-size:12px;color:var(--muted);margin-top:4px}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.tab-btn{flex:1;padding:13px 6px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none;padding:16px}.tab-content.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.card-hd{padding:14px 16px 10px;border-bottom:1px solid var(--border)}.card-hd h3{font-size:14px;font-weight:600}.card-hd p{font-size:12px;color:var(--muted);margin-top:3px}
.card-bd{padding:14px 16px}
.score-grid{display:grid;grid-template-columns:1fr 36px 1fr;gap:8px;align-items:center}
.stl{font-size:12px;font-weight:700;text-align:center;margin-bottom:5px}.stl.h{color:var(--blue)}.stl.a{color:var(--red)}
.spinner{display:flex;flex-direction:column;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;gap:3px}
.sp-btn{background:var(--border);border:none;border-radius:7px;width:100%;padding:9px 0;font-size:15px;font-weight:700;cursor:pointer;color:#e6edf3}
.sp-btn:active{background:#3d444d;transform:scale(.95)}
.sp-val{font-size:36px;font-weight:800;text-align:center;line-height:1;padding:6px 0;min-width:44px}
.sp-val.h{color:var(--blue)}.sp-val.a{color:var(--red)}
.vs-mid{text-align:center;font-size:22px;font-weight:800;color:var(--muted)}
.calc-btn{width:100%;background:var(--green);border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;color:#0d1117;cursor:pointer;margin-top:14px}
.calc-btn:active{opacity:.85;transform:scale(.98)}
.calc-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.criteria{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--muted);line-height:1.9}
.criteria b{color:#e6edf3}
.summary{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:none}
.summary.show{display:block}
.sum-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}.sum-row .lbl{color:var(--muted)}.sum-row .val{font-weight:600}
.r-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.r-row{display:flex;align-items:center;padding:12px 14px;gap:10px}
.r-rank{font-size:13px;font-weight:700;color:var(--muted);min-width:28px;text-align:center}
.r-rank.gold{color:var(--gold);font-size:18px}
.r-info{flex:1}.r-name{font-size:14px;font-weight:600}.r-name.win{color:var(--gold)}.r-pred{font-size:12px;color:var(--muted);margin-top:2px}
.r-right{text-align:right}.r-pts{font-size:15px;font-weight:700}.r-pts.top{color:var(--green)}.r-prize{font-size:13px;color:var(--gold);font-weight:600;margin-top:2px}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.p-row{display:flex;align-items:center;padding:12px 14px;gap:10px}
.p-num{font-size:12px;font-weight:700;color:var(--muted);min-width:22px}
.p-info{flex:1}.p-name{font-size:14px;font-weight:600}.p-time{font-size:11px;color:var(--muted);margin-top:2px}
.p-sc{font-size:16px;font-weight:800}.psh{color:var(--blue)}.psa{color:var(--red)}.pss{color:var(--muted);font-size:13px}
.list-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.list-cnt{font-size:13px;color:var(--muted)}.list-cnt b{color:var(--gold);font-size:15px}
.ref-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer}
.clear-btn{width:100%;background:transparent;border:1px solid var(--red);border-radius:10px;padding:12px;font-size:13px;font-weight:600;color:var(--red);cursor:pointer;margin-top:12px}
.clear-btn:active{background:rgba(233,69,96,.1)}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}.empty .ic{font-size:40px;margin-bottom:12px}
.loading-msg{text-align:center;padding:32px 20px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="admin-badge">🔐 관리자 전용</div>
  <h1>로패를 위한 2026년 멕시코 월드컵<br>승부 맞추기(찐) — 관리자</h1>
  <p>대한민국 vs 멕시코</p>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('result')">🏆 결과 입력</button>
  <button class="tab-btn" onclick="switchTab('entries')">👥 참가자 관리</button>
</div>

<!-- 결과 입력 탭 -->
<div class="tab-content active" id="tab-result">
  <div class="card">
    <div class="card-hd"><h3>실제 경기 결과 입력</h3><p>최종 스코어를 입력 후 배당금을 계산하세요</p></div>
    <div class="card-bd">
      <div class="score-grid">
        <div>
          <div class="stl h">대한민국</div>
          <div class="spinner">
            <button class="sp-btn" onclick="spin('rh',1)">▲</button>
            <div class="sp-val h" id="vrh">0</div>
            <button class="sp-btn" onclick="spin('rh',-1)">▼</button>
          </div>
        </div>
        <div class="vs-mid">:</div>
        <div>
          <div class="stl a">멕시코</div>
          <div class="spinner">
            <button class="sp-btn" onclick="spin('ra',1)">▲</button>
            <div class="sp-val a" id="vra">0</div>
            <button class="sp-btn" onclick="spin('ra',-1)">▼</button>
          </div>
        </div>
      </div>
      <button class="calc-btn" id="calc-btn" onclick="calculate()">✅ 배당금 계산하기</button>
    </div>
  </div>

  <div class="criteria"><b>채점 기준</b><br>• 승패(무) 적중 → +2점<br>• 정확한 스코어 적중 → +3점 (승패 포함 총 5점)</div>

  <div class="summary" id="summary">
    <div class="sum-title">📊 계산 결과</div>
    <div class="sum-row"><span class="lbl">실제 결과</span><span class="val" id="s-real">—</span></div>
    <div class="sum-row"><span class="lbl">참가자</span><span class="val" id="s-cnt">—</span></div>
    <div class="sum-row"><span class="lbl">총 상금</span><span class="val" id="s-pot">—</span></div>
    <div class="sum-row"><span class="lbl">당첨자</span><span class="val" id="s-win">—</span></div>
    <div class="sum-row"><span class="lbl">1인 배당금</span><span class="val" id="s-prize">—</span></div>
  </div>
  <div id="result-list"></div>
</div>

<!-- 참가자 관리 탭 -->
<div class="tab-content" id="tab-entries">
  <div class="list-hd">
    <div class="list-cnt">총 <b id="entry-total">0</b>명</div>
    <button class="ref-btn" onclick="loadEntries()">🔄 새로고침</button>
  </div>
  <div id="entry-list"><div class="loading-msg">불러오는 중...</div></div>
  <button class="clear-btn" onclick="clearAll()">🗑️ 전체 데이터 초기화</button>
</div>

<script>
const BIN_ID  = '6a348013f5f4af5e290be80c';
const API_KEY = '$2a$10$AA/r19btSfKXcfGKQ825aen.2vo34PhHwyIPIIoHrHp6S/ouRLS8q';
const HOME = '대한민국', AWAY = '멕시코';
const ENTRY_FEE = 2000;
let rs = { rh: 0, ra: 0 };

function spin(id, d) { rs[id] = Math.max(0, rs[id] + d); document.getElementById('v' + id).textContent = rs[id]; }
function winner(h,a){ return h>a?'home':a>h?'away':'draw'; }

async function fetchAll() {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    method: 'GET',
    headers: { 'X-Master-Key': API_KEY }
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  const rec = Array.isArray(data.record) ? data.record : (Array.isArray(data) ? data : []);
  return rec.filter(p => !p.init);
}
async function putAll(list) {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
    body: JSON.stringify(list)
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
}

async function calculate() {
  const btn = document.getElementById('calc-btn');
  btn.disabled = true; btn.textContent = '계산 중...';
  try {
    const all = await fetchAll();
    if (!all.length) { alert('저장된 참가자가 없습니다.'); btn.disabled=false; btn.textContent='✅ 배당금 계산하기'; return; }

    const rh = rs.rh, ra = rs.ra, rr = winner(rh, ra);
    const pot = all.length * ENTRY_FEE;
    const scored = all.map(p => { let pts=0; if(winner(p.home,p.away)===rr)pts+=2; if(p.home===rh&&p.away===ra)pts+=3; return {...p,pts}; });
    const maxPts = Math.max(...scored.map(p=>p.pts));
    const wins = scored.filter(p=>p.pts===maxPts);
    const prize = maxPts>0 ? Math.floor(pot/wins.length) : 0;
    const sorted = [...scored].sort((a,b)=>b.pts-a.pts);

    document.getElementById('s-real').textContent = `${HOME} ${rh} : ${ra} ${AWAY}`;
    document.getElementById('s-cnt').textContent = `${all.length}명`;
    document.getElementById('s-pot').textContent = `${pot.toLocaleString()}원`;
    document.getElementById('s-win').textContent = maxPts>0 ? wins.map(p=>p.name).join(', ') : '없음';
    document.getElementById('s-prize').textContent = maxPts>0 ? `${prize.toLocaleString()}원` : '—';
    document.getElementById('summary').classList.add('show');

    document.getElementById('result-list').innerHTML = sorted.map((p,i)=>{
      const isW = wins.includes(p) && maxPts>0;
      return `<div class="r-card"><div class="r-row">
        <div class="r-rank ${isW?'gold':''}">${isW?'🥇':i+1}</div>
        <div class="r-info"><div class="r-name ${isW?'win':''}">${esc(p.name)}</div><div class="r-pred">${HOME} ${p.home} : ${p.away} ${AWAY}</div></div>
        <div class="r-right"><div class="r-pts ${isW?'top':''}">${p.pts}점</div>${isW?`<div class="r-prize">+${prize.toLocaleString()}원</div>`:''}</div>
      </div></div>`;
    }).join('');
  } catch(e) { alert('오류: ' + e.message); }
  btn.disabled=false; btn.textContent='✅ 배당금 계산하기';
}

async function loadEntries() {
  const box = document.getElementById('entry-list');
  box.innerHTML = '<div class="loading-msg">불러오는 중...</div>';
  try {
    const all = await fetchAll();
    document.getElementById('entry-total').textContent = all.length;
    if (!all.length) { box.innerHTML='<div class="empty"><div class="ic">👥</div>참가자가 없습니다</div>'; return; }
    const sorted = [...all].sort((a,b)=>a.ts-b.ts);
    box.innerHTML = sorted.map((p,i)=>`
      <div class="p-card"><div class="p-row">
        <div class="p-num">${i+1}</div>
        <div class="p-info"><div class="p-name">${esc(p.name)}</div><div class="p-time">⏱ ${p.time}</div></div>
        <div class="p-sc"><span class="psh">${p.home}</span><span class="pss"> : </span><span class="psa">${p.away}</span></div>
      </div></div>`).join('');
  } catch(e) { box.innerHTML='<div class="empty">데이터를 불러오지 못했습니다</div>'; }
}

async function clearAll() {
  if (!confirm('⚠️ 전체 참가자 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  try { await putAll([]); await loadEntries(); alert('초기화 완료'); }
  catch(e) { alert('오류: ' + e.message); }
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  if (name==='result') { document.querySelectorAll('.tab-btn')[0].classList.add('active'); document.getElementById('tab-result').classList.add('active'); }
  else { document.querySelectorAll('.tab-btn')[1].classList.add('active'); document.getElementById('tab-entries').classList.add('active'); loadEntries(); }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
